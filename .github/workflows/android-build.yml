name: Build & Release Unchained TorBox

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 36
          build-tools: 36.0.0
      
      - name: Make gradlew executable
        run: chmod +x app/gradlew
      
      - name: Gradle Sync
        working-directory: ./app
        run: ./gradlew clean --dry-run
      
      - name: Build Debug APK
        id: build
        working-directory: ./app
        run: |
          ./gradlew build -x lint -x lintVital -x test --no-daemon --stacktrace 2>&1 | tee build.log
          echo "Exit code: $?"
      
      - name: Check Build Result
        run: |
          echo "=== Checking for APK ==="
          find app -name "*.apk" -type f 2>/dev/null | head -20
          echo ""
          echo "=== Checking build outputs ==="
          ls -lR app/app/build/outputs/ 2>/dev/null | head -50
          echo ""
          echo "=== Last 50 lines of build.log ==="
          tail -50 app/build.log
          exit 1
      
      - name: Upload APK to artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: unchained-torbox-debug
          path: app/app/build/outputs/apk/debug/app-debug.apk
      
      - name: Create Release
        if: success()
        uses: softprops/action-gh-release@v1
        with:
          files: app/app/build/outputs/apk/debug/app-debug.apk
          tag_name: build-${{ github.run_number }}
          body: |
            Build #${{ github.run_number }}
            Commit: ${{ github.sha }}
            
            Debug APK ready for testing.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
