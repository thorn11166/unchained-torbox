name: Build & Release Unchained TorBox

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'
      
      - name: Setup Android SDK
        id: setup-android
        uses: android-actions/setup-android@v3
        with:
          api-level: 36
          build-tools: 36.0.0
      
      - name: Debug Environment
        run: |
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          echo "ANDROID_HOME=$ANDROID_HOME"
          ls -la $ANDROID_SDK_ROOT/platforms/ 2>/dev/null | head -5 || echo "Platforms dir not found"
      
      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > app/local.properties
          cat app/local.properties
      
      - name: Make gradlew executable
        run: chmod +x app/gradlew
      
      - name: Gradle Sync
        working-directory: ./app
        run: echo "Skipping dry-run for now"
      
      - name: Build Debug APK
        id: build
        working-directory: ./app
        run: |
          ./gradlew assembleDebug -x lint -x test --no-daemon --stacktrace --info 2>&1 | tee build.log
          echo "Exit code: $?"
        continue-on-error: true
      
      - name: Check Build Result
        run: |
          echo "=== Checking for APK ===" >> diagnostics.log
          find app -name "*.apk" -type f 2>/dev/null | head -20 >> diagnostics.log
          echo "" >> diagnostics.log
          echo "=== Checking build outputs ===" >> diagnostics.log
          ls -lR app/app/build/outputs/ 2>/dev/null | head -100 >> diagnostics.log
          echo "" >> diagnostics.log
          echo "=== Last 100 lines of build.log ===" >> diagnostics.log
          tail -100 app/build.log >> diagnostics.log
          cat diagnostics.log
          exit 1
      
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-diagnostics
          path: |
            diagnostics.log
            app/build.log
      
      - name: Upload APK to artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: unchained-torbox-debug
          path: app/app/build/outputs/apk/debug/app-debug.apk
      
      - name: Create Release
        if: success()
        uses: softprops/action-gh-release@v1
        with:
          files: app/app/build/outputs/apk/debug/app-debug.apk
          tag_name: build-${{ github.run_number }}
          body: |
            Build #${{ github.run_number }}
            Commit: ${{ github.sha }}
            
            Debug APK ready for testing.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
